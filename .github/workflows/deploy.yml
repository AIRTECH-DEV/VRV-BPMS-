name: Final Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Inject Google credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push code to Apps Script
        run: clasp push --force

      # ✅ Updates the SAME deployment = URL never changes
      - name: Update Existing Deployment
        run: clasp deploy -i ${{ secrets.CLASP_DEPLOYMENT_ID }} --description "Updated - ${{ github.sha }}"