<!DOCTYPE html>
<html>
<head>
    <title>Test Login Page</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4a90e2 0%, #50d2c2 100%);
            font-family: Arial, sans-serif;
            color: #222;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            padding: 32px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.15);
        }

        .login-card h2 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 28px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 18px;
            border: 1px solid #cbd5e0;
            border-radius: 12px;
            background: #f7fbff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.18);
        }

        #login-button {
            width: 100%;
            padding: 13px 16px;
            border: none;
            border-radius: 12px;
            background: #4a90e2;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        #login-button:hover {
            background: #3c7ac9;
            transform: translateY(-1px);
        }

        #login-button:active {
            transform: translateY(0);
        }

        #logout-button {
            width: 100%;
            padding: 13px 16px;
            border: none;
            border-radius: 12px;
            background: #7b8cce;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            margin-top: 18px;
        }

        #logout-button:hover {
            background: #6675b5;
            transform: translateY(-1px);
        }

        #logout-button:active {
            transform: translateY(0);
        }

        .error-message {
            margin: 0 0 18px;
            color: #c0392b;
            font-size: 14px;
            line-height: 1.4;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card" id="login-card">
        <h2>Login</h2>
        <form id="login-form" action="/success-page" method="POST">
            <p class="error-message" id="error-message">Username or password is incorrect.</p>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter Username" required>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter Password" required>
            
            <button type="submit" id="login-button">Login</button>
        </form>
    </div>

    <div class="login-card thank-you-card" id="thank-you-card" hidden>
        <h2>Thanks!</h2>
        <p id="thank-you-message">Hello, <span id="thank-you-name"></span>. Your form has been submitted.</p>
        <button id="logout-button">Logout</button>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginCard = document.getElementById('login-card');
        const thankYouCard = document.getElementById('thank-you-card');
        const thankYouName = document.getElementById('thank-you-name');
        const logoutButton = document.getElementById('logout-button');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (username.toLowerCase() === 'yash' && password === 'pass') {
                errorMessage.style.display = 'none';
                thankYouName.textContent = username;
                loginCard.hidden = true;
                thankYouCard.hidden = false;
            } else {
                errorMessage.style.display = 'block';
            }
        });

        logoutButton.addEventListener('click', function() {
            loginForm.reset();
            errorMessage.style.display = 'none';
            thankYouCard.hidden = true;
            loginCard.hidden = false;
        });
    </script>
</body>
</html>
